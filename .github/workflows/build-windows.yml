name: Build Windows Package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (optional, e.g. v1.2.3)"
        required: false
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: true
        type: boolean
  push:
    branches:
      - main
      - preview
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-sqlite3
            mingw-w64-ucrt-x86_64-mosquitto
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-svg

      - name: Build all variants
        id: build
        run: |
          set -euo pipefail
          output_file="$(cygpath -u "$GITHUB_OUTPUT")"

          rm -rf dist-single dist-portable dist-qt release
          mkdir -p dist-single dist-portable dist-qt release

          single_log="build-single.log"
          portable_log="build-portable.log"
          qt_log="build-qt.log"

          single_ok=false
          portable_ok=false
          qt_ok=false

          {
            echo "[single] make clean"
            make clean
            echo "[single] make STATIC=1 EXEEXT=.exe propagation_bot.exe"
            make STATIC=1 EXEEXT=.exe propagation_bot.exe
            cp propagation_bot.exe dist-single/
          } > "$single_log" 2>&1 || true

          if [ -f dist-single/propagation_bot.exe ]; then
            single_ok=true
          fi

          {
            echo "[portable] make clean"
            make clean
            echo "[portable] make EXEEXT=.exe"
            make EXEEXT=.exe
            echo "[portable] make EXEEXT=.exe qt-desktop"
            make EXEEXT=.exe qt-desktop
            echo "[portable] package propagation_bot dependencies"
            python .github/scripts/package_windows.py propagation_bot.exe dist-portable "$MINGW_PREFIX/bin"
            cp propagation_desktop.exe dist-portable/
            echo "[portable] package propagation_qt_desktop dependencies"
            python .github/scripts/package_windows.py propagation_qt_desktop.exe dist-portable "$MINGW_PREFIX/bin"
            windeployqt6 --no-translations --no-compiler-runtime dist-portable/propagation_qt_desktop.exe
          } > "$portable_log" 2>&1 || true

          if [ -f dist-portable/propagation_bot.exe ] && [ -f dist-portable/propagation_desktop.exe ] && [ -f dist-portable/propagation_qt_desktop.exe ]; then
            portable_ok=true
          fi

          {
            echo "[qt] make clean"
            make clean
            echo "[qt] make EXEEXT=.exe qt-desktop"
            make EXEEXT=.exe qt-desktop
            echo "[qt] package propagation_qt_desktop dependencies"
            python .github/scripts/package_windows.py propagation_qt_desktop.exe dist-qt "$MINGW_PREFIX/bin"
            windeployqt6 --no-translations --no-compiler-runtime dist-qt/propagation_qt_desktop.exe
          } > "$qt_log" 2>&1 || true

          if [ -f dist-qt/propagation_qt_desktop.exe ]; then
            qt_ok=true
          fi

          if [ "$single_ok" = "true" ]; then
            cp dist-single/propagation_bot.exe release/propagation_bot.exe
          fi

          if [ "$portable_ok" = "true" ]; then
            python -c "from pathlib import Path; import zipfile; src=Path('dist-portable'); out=Path('release/propagation-windows-portable.zip'); out.parent.mkdir(parents=True, exist_ok=True); zf=zipfile.ZipFile(out, 'w', zipfile.ZIP_DEFLATED); [zf.write(p, p.relative_to(src)) for p in src.rglob('*') if p.is_file()]; zf.close()"
          fi

          if [ "$qt_ok" = "true" ]; then
            python -c "from pathlib import Path; import zipfile; src=Path('dist-qt'); out=Path('release/propagation-qt-desktop.zip'); out.parent.mkdir(parents=True, exist_ok=True); zf=zipfile.ZipFile(out, 'w', zipfile.ZIP_DEFLATED); [zf.write(p, p.relative_to(src)) for p in src.rglob('*') if p.is_file()]; zf.close()"
          fi

          all_ok=false
          if [ "$single_ok" = "true" ] && [ "$portable_ok" = "true" ] && [ "$qt_ok" = "true" ]; then
            all_ok=true
          fi

          echo "single_ok=$single_ok" >> "$output_file"
          echo "portable_ok=$portable_ok" >> "$output_file"
          echo "qt_ok=$qt_ok" >> "$output_file"
          echo "all_ok=$all_ok" >> "$output_file"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: propagation-bot-build-logs
          path: build-*.log
          if-no-files-found: warn

      - name: Upload single artifact
        if: steps.build.outputs.single_ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: propagation-bot-windows-single-exe
          path: dist-single/propagation_bot.exe
          if-no-files-found: error

      - name: Upload portable artifact
        if: steps.build.outputs.portable_ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: propagation-bot-windows-portable
          path: dist-portable/
          if-no-files-found: error

      - name: Upload Qt artifact
        if: steps.build.outputs.qt_ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: propagation-bot-qt-desktop
          path: dist-qt/
          if-no-files-found: error

      - name: Resolve release metadata
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        id: release_meta
        run: |
          set -euo pipefail
          output_file="$(cygpath -u "$GITHUB_OUTPUT")"
          if [ "${{ github.event_name }}" = "push" ]; then
            tag_name="${GITHUB_REF_NAME}"
            prerelease="false"
          else
            tag_name="${{ inputs.release_tag }}"
            prerelease="${{ inputs.prerelease }}"
            if [ -z "$tag_name" ]; then
              tag_name="preview-${GITHUB_SHA:0:7}"
            fi
          fi
          echo "tag_name=$tag_name" >> "$output_file"
          echo "prerelease=$prerelease" >> "$output_file"

      - name: Publish release assets
        if: (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch') && steps.build.outputs.all_ok == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: Windows Build ${{ steps.release_meta.outputs.tag_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release/propagation_bot.exe
            release/propagation-windows-portable.zip
            release/propagation-qt-desktop.zip

      - name: Write summary
        if: always()
        run: |
          summary_file="$(cygpath -u "$GITHUB_STEP_SUMMARY")"
          echo "Windows build status:" >> "$summary_file"
          echo "- single:   ${{ steps.build.outputs.single_ok }}" >> "$summary_file"
          echo "- portable: ${{ steps.build.outputs.portable_ok }}" >> "$summary_file"
          echo "- qt:       ${{ steps.build.outputs.qt_ok }}" >> "$summary_file"
          echo "" >> "$summary_file"
          if [ "${{ steps.build.outputs.all_ok }}" = "true" ]; then
            echo "All three variants built successfully." >> "$summary_file"
          else
            echo "At least one variant failed. Check uploaded logs." >> "$summary_file"
          fi

      - name: Fail if any variant failed
        if: steps.build.outputs.all_ok != 'true'
        run: exit 1
